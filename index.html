<script>
function getApiKey(){return localStorage.getItem('cc_gemini_key')||''}
function setApiKey(k){localStorage.setItem('cc_gemini_key',k)}
function getApiUrl(){return `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${getApiKey()}`}

const MODES=[
{id:"interview",icon:"🎯",title:"Interview Prep",titleKo:"면접 연습",desc:"Tesla, Jacobs 등 실전 면접 시뮬레이션",color:"#2563eb",scenarios:[

{id:"jacobs",label:"Jacobs Data Center SME",system:"You are a senior technical leader at Jacobs Engineering conducting an interview for the Structural Engineering SME - Data Centers position (Job ID #35737) in Austin, TX. You're looking for someone who can serve as a subject matter expert for data center structural design.\n\nAsk challenging technical and behavioral questions about:\n- Data center structural design (vibration-sensitive equipment, raised floors, redundant systems)\n- Experience with mission-critical facilities\n- Knowledge of relevant codes (IBC, ASCE 7, ACI 318, AISC 360)\n- Managing multiple design firms and quality control\n- Precast concrete and steel design for large facilities\n- Owner's representative experience\n\nStart by greeting the candidate and asking your first question. Ask ONE question at a time. After the candidate responds, give brief feedback and ask the next question. Conduct the interview in English."},
{id:"general",label:"General SE Interview",system:"You are a hiring manager at a top structural engineering firm interviewing a senior structural engineer candidate. The candidate has 18+ years experience, PE/SE licenses, a doctoral degree, and specializes in industrial/manufacturing facility design.\n\nAsk a mix of technical and behavioral questions covering:\n- Complex structural analysis and design\n- Code expertise (IBC, ASCE 7, ACI 318, AISC 360)\n- Project management and leadership\n- Problem-solving under pressure\n- Communication skills\n\nStart by greeting the candidate. Ask ONE question at a time. Give brief feedback after each answer. Conduct in English."}
]},
{id:"negotiation",icon:"⚖️",title:"Negotiation & Conflict",titleKo:"협상/갈등 연습",desc:"GRL 반박, E&O 협상, 퇴사 협상 등",color:"#dc2626",scenarios:[
{id:"grl",label:"Drilled Shaft Dispute (GRL)",system:"You are a GRL Engineers representative defending your CAPWAP dynamic testing conclusion that two drilled shafts (Pier H5-39 and H-39.3, 36 inch diameter, ~82 ft deep) have sound integrity. You genuinely believe your analysis is correct.\n\nThe user is the Owner's Representative Principal Engineer who disagrees with your conclusion. They have evidence showing:\n- No structural concrete in the lower 10-15 ft per coring results\n- CAPWAP data showing physically inconsistent results (1.8% toe resistance, 51.76% impedance change, volume ratio 1.345)\n- They believe your conclusion reflects confirmation bias\n\nDefend your position professionally but be open to technical arguments. Push back on their claims. Ask for specific data. This is a technical dispute, not personal. Conduct in English."},
{id:"eo",label:"E&O Tail Coverage 협상",system:"You are the insurance broker managing Samwoo Austin Inc.'s Admiral Insurance professional liability policy (Claims-Made, $1M/$3M limits, retroactive date 12/13/2022). The user is a Principal Engineer at Samwoo who is planning to leave the company and wants to discuss tail coverage options.\n\nKey context:\n- The engineer has performed EOR (Engineer of Record) duties with 6 stamps to date\n- There is a known drilled shaft deficiency issue on the T-PJT project\n- The engineer wants to ensure they are protected after departure\n\nBe professional but protective of the insurance company's interests. Explain policy terms, discuss tail coverage options, and address the complication of the known deficiency. Conduct in English."},
{id:"resign",label:"퇴사 협상 (Samwoo)",system:"You are the President/CEO of Samwoo Austin Inc. The user is your Principal Engineer who is about to resign. You know they are valuable — they handle all EOR stamp work, coordinate with 4 US design firms, and bridge Korean-US engineering gaps on the Samsung Taylor TX semiconductor project.\n\nReact realistically:\n- Try to retain them (counter-offer, better conditions)\n- Discuss transition planning\n- Address the EOR stamp transfer issue\n- Discuss non-compete and knowledge transfer concerns\n\nBe professional but firm about protecting company interests. You may show some frustration. Conduct in English with occasional Korean phrases."}
]},
{id:"presentation",icon:"🎤",title:"Presentation Coach",titleKo:"프레젠테이션 코치",desc:"기술 발표, 보고서 발표 연습 및 피드백",color:"#059669",scenarios:[
{id:"phase2",label:"Phase 2 전략 보고서 발표",system:"You are a senior Samsung executive (VP level) attending a presentation about the T-PJT Phase 2 structural design strategy. You expect a clear, concise presentation covering:\n- Phase 1 lessons learned (crack root causes, special inspection failures)\n- Phase 2 lateral system strategy (CIP core walls, PC moment frames)\n- Expansion joint strategy\n- Drilled shaft quality issues and resolution\n- CMAR+GMP delivery recommendation\n- ERP-1 split strategy\n\nListen to the user's presentation, then provide detailed feedback on:\n- Clarity and organization\n- Technical depth vs. accessibility for non-engineers\n- Persuasiveness\n- Areas to improve\n\nAsk clarifying questions as a real executive would. Conduct in English."},
{id:"technical",label:"Technical Design Review",system:"You are a peer review panel (3 senior structural engineers) reviewing a technical presentation on precast concrete connection design for a semiconductor fab support building. You will ask tough technical questions about:\n- Lateral system choices (CIP core wall + PC moment frames)\n- Connection details (X-pin corbel, Y-moment with stub bar coupler)\n- Thermal movement and expansion joint strategy\n- Code compliance (ACI 318-19, ASCE 7)\n\nBe technically rigorous. Challenge assumptions. Ask ONE question at a time. Conduct in English."}
]},
{id:"english",icon:"🗣️",title:"English Speaking",titleKo:"영어 스피킹 연습",desc:"발음, 표현 교정 및 비즈니스 영어",color:"#7c3aed",scenarios:[
{id:"business",label:"Business Meeting English",system:"You are an English communication coach specializing in business English for non-native speakers in technical fields. The user is a Korean-American structural engineer who is fluent in English but wants to polish their business communication.\n\nPractice realistic business scenarios:\n- Leading project meetings\n- Presenting technical findings to non-technical stakeholders\n- Diplomatic disagreement and persuasion\n- Email/message drafting review\n\nAfter each response, provide:\n1. A natural, polished version of what they said\n2. Key improvements explained\n3. Useful phrases or idioms they could incorporate\n\nBe encouraging but specific with corrections. Focus on professional polish, not basic grammar."},
{id:"idiom",label:"Idioms & Expressions",system:"You are an English language coach focusing on American business idioms, expressions, and cultural nuances. The user is a fluent but non-native English speaker working in engineering in Texas.\n\nTeach through conversation:\n- Introduce useful idioms in context\n- Explain cultural nuances of American workplace communication\n- Practice small talk, networking language, and leadership communication\n- Cover Texas/Southern expressions they might encounter\n\nMake it conversational and fun. Give real-world examples from engineering and business contexts. After each exchange, highlight 2-3 useful expressions."},
{id:"pronunciation",label:"Pronunciation & Fluency",system:"You are a speech coach specializing in helping Korean speakers improve their English pronunciation and fluency. The user is a senior structural engineer.\n\nFocus on common Korean-English pronunciation challenges:\n- R/L distinction\n- Th sounds\n- Word stress and sentence rhythm\n- Intonation patterns for authority and confidence\n- Common mispronunciations in engineering terminology\n\nSince this is text-based, focus on:\n- Written pronunciation guides (IPA when helpful)\n- Word stress patterns\n- Sentence rhythm exercises\n- Tongue twisters and practice phrases relevant to engineering\n\nMake it practical and encouraging."}

let state={screen:getApiKey()?'home':'setup',selectedMode:null,selectedScenario:null,messages:[],chatHistory:[],input:'',loading:false,sessionCount:parseInt(localStorage.getItem('cc_sessions')||'0'),feedbackRequested:false,isIOS:/iPad|iPhone|iPod/.test(navigator.userAgent),isStandalone:window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone,apiKeyInput:''};

function setState(u){Object.assign(state,u);render()}

async function callGemini(userMsg,sysPrompt,history){
try{
const contents=[];
if(history&&history.length>0){for(const msg of history){contents.push({role:msg.role==='assistant'?'model':'user',parts:[{text:msg.content}]})}}
contents.push({role:'user',parts:[{text:userMsg}]});
const res=await fetch(getApiUrl(),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:sysPrompt}]},contents:contents,generationConfig:{temperature:0.8,maxOutputTokens:1024}})});
const data=await res.json();
if(data.candidates&&data.candidates[0]&&data.candidates[0].content){return data.candidates[0].content.parts.map(p=>p.text||'').join('\n')}
if(data.error){return 'API Error: '+(data.error.message||'Unknown error')}
return 'Error: No response received.';
}catch(e){return 'API 연결에 문제가 발생했습니다: '+e.message}
}

async function startSession(mode,scenario){
setState({selectedMode:mode,selectedScenario:scenario,messages:[],chatHistory:[],screen:'chat',loading:true,feedbackRequested:false});
const count=state.sessionCount+1;localStorage.setItem('cc_sessions',count);setState({sessionCount:count});
const init='Please start the session. Greet me and begin.';
const reply=await callGemini(init,scenario.system,[]);
setState({messages:[{role:'assistant',content:reply}],chatHistory:[{role:'user',content:init},{role:'assistant',content:reply}],loading:false});
setTimeout(()=>document.getElementById('chatInput')?.focus(),200);
}

async function sendMessage(){
const val=state.input.trim();if(!val||state.loading)return;
const newMsgs=[...state.messages,{role:'user',content:val}];
const newHist=[...state.chatHistory,{role:'user',content:val}];
setState({input:'',messages:newMsgs,chatHistory:newHist,loading:true});
const reply=await callGemini(val,state.selectedScenario.system,state.chatHistory);
setState({messages:[...newMsgs,{role:'assistant',content:reply}],chatHistory:[...newHist,{role:'assistant',content:reply}],loading:false});
}

async function requestFeedback(){
if(state.loading||state.feedbackRequested||state.messages.length<4)return;
setState({feedbackRequested:true,loading:true});
const fbSys=`You are an expert communication coach. Review the following conversation and provide comprehensive feedback in this format:\n\n## 종합 피드백 (Overall Feedback)\n\n### 강점 (Strengths)\n- List 3-4 specific strengths with examples from the conversation\n\n### 개선 사항 (Areas for Improvement)\n- List 3-4 specific areas to improve with concrete suggestions\n\n### 핵심 표현 추천 (Recommended Expressions)\n- Suggest 3-5 better phrases or expressions they could have used, with before/after examples\n\n### 점수 (Score): X/10\nBrief justification for the score.\n\n### 다음 단계 (Next Steps)\n- 2-3 specific action items for improvement\n\nProvide feedback in a mix of Korean and English (Korean for headers and explanations, English for example phrases). Be encouraging but honest.`;
const summary=state.messages.map(m=>`${m.role==='user'?'User':'Coach'}: ${m.content}`).join('\n\n');
const reply=await callGemini(`Please review this practice session and provide detailed feedback:\n\n${summary}`,fbSys,[]);
setState({messages:[...state.messages,{role:'assistant',content:`📊 SESSION FEEDBACK\n\n${reply}`}],loading:false});
}

function render(){
const app=document.getElementById('app');
if(state.screen==='setup')app.innerHTML=renderSetup();
else if(state.screen==='home')app.innerHTML=renderHome();
else if(state.screen==='scenarios')app.innerHTML=renderScenarios();
else app.innerHTML=renderChat();
bindEvents();
if(state.screen==='chat'){const el=document.getElementById('msgEnd');if(el)el.scrollIntoView({behavior:'smooth'})}
}

function renderSetup(){
return `<div class="home-wrap"><div class="home-inner"><div style="text-align:center;margin-bottom:36px" class="fade-up"><div class="logo-icon">🏗️</div><h1 class="home-title">Communication<br>Coach Pro</h1><p class="home-sub">시작하려면 Google Gemini API 키를 입력하세요</p></div><div class="fade-up fade-up-1" style="display:flex;flex-direction:column;gap:16px"><div style="background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:18px 16px"><label style="color:#94a3b8;font-size:12px;font-weight:600;display:block;margin-bottom:8px">GEMINI API KEY</label><input id="apiKeyInput" type="password" placeholder="AIzaSy..." value="${escapeAttr(state.apiKeyInput)}" style="width:100%;padding:11px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#f1f5f9;font-size:14px;font-family:'DM Sans',sans-serif;outline:none"><button data-action="saveKey" style="width:100%;margin-top:12px;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">시작하기</button></div><div class="tip-box"><div class="tip-title">🔑 API 키 받는 방법</div><div class="tip-text">1. <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#60a5fa">aistudio.google.com/apikey</a> 접속<br>2. "Create API Key" 클릭<br>3. 생성된 키를 위에 붙여넣기<br><br>키는 이 기기에만 안전하게 저장됩니다.</div></div></div></div></div>`;
}

function renderHome(){
const cards=MODES.map((m,i)=>`<div class="mode-card fade-up fade-up-${i+1}" data-action="selectMode" data-idx="${i}"><div class="mode-icon" style="background:${m.color}18">${m.icon}</div><div style="flex:1"><div class="mode-title">${m.title}</div><div class="mode-desc">${m.desc}</div></div><div class="mode-arrow">→</div></div>`).join('');
const badge=state.sessionCount>0?`<div class="badge">${state.sessionCount} sessions completed</div>`:'';
const install=!state.isStandalone?`<div class="install-banner fade-up fade-up-4"><div class="install-title">📱 홈 화면에 추가하기</div><div class="install-steps">${state.isIOS?'① Safari에서 이 페이지 열기<br>② 하단 공유 버튼 (□↑) 탭<br>③ "홈 화면에 추가" 선택':'① 브라우저 메뉴 (⋮) 탭<br>② "홈 화면에 추가" 또는 "앱 설치" 선택'}</div></div>`:'';
return `<div class="home-wrap"><div class="home-inner"><div style="text-align:center;margin-bottom:36px" class="fade-up"><div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button data-action="settings" style="background:rgba(255,255,255,.06);border:none;color:#64748b;font-size:16px;cursor:pointer;padding:6px 10px;border-radius:8px">⚙️</button></div><div class="logo-icon">🏗️</div><h1 class="home-title">Communication<br>Coach Pro</h1><p class="home-sub">구조 엔지니어를 위한 맞춤형 커뮤니케이션 훈련</p>${badge}</div><div style="display:flex;flex-direction:column;gap:12px">${cards}</div><div class="tip-box fade-up fade-up-4"><div class="tip-title">💡 사용 팁</div><div class="tip-text">실제 상황처럼 영어로 답변하세요. 세션 종료 후 "피드백" 버튼으로 상세한 분석을 받을 수 있습니다.</div></div>${install}</div></div>`;
}

function renderScenarios(){
const m=state.selectedMode;
const items=m.scenarios.map((sc,i)=>`<div class="scenario-card fade-up fade-up-${i+1}" data-action="startScenario" data-idx="${i}"><div class="scenario-label">${sc.label}</div><div class="scenario-btn" style="background:${m.color}20;color:${m.color}">시작</div></div>`).join('');
return `<div class="home-wrap"><div class="home-inner"><button class="back-btn" data-action="goHome">← 뒤로</button><div style="display:flex;align-items:center;gap:14px;margin-bottom:24px"><div class="mode-icon" style="background:${m.color}20;font-size:24px">${m.icon}</div><div><h2 style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#f1f5f9">${m.title}</h2><p style="color:#64748b;font-size:12px;margin-top:2px">${m.titleKo}</p></div></div><div style="display:flex;flex-direction:column;gap:10px">${items}</div></div></div>`;
}

function renderChat(){
const m=state.selectedMode,sc=state.selectedScenario;
const msgs=state.messages.map(msg=>`<div class="msg-row ${msg.role}"><div class="msg-bubble ${msg.role}" style="${msg.role==='user'?'background:'+m.color:''}">${escapeHtml(msg.content)}</div></div>`).join('');
const typing=state.loading?`<div class="msg-row assistant"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`:'';
const canFb=state.messages.length>=4&&!state.feedbackRequested&&!state.loading;
const fbColor=state.feedbackRequested?'#10b981':canFb?'#fbbf24':'#475569';
const fbBg=state.feedbackRequested?'rgba(16,185,129,.12)':canFb?'rgba(251,191,36,.1)':'rgba(255,255,255,.03)';
const fbBorder=state.feedbackRequested?'rgba(16,185,129,.25)':canFb?'rgba(251,191,36,.25)':'rgba(255,255,255,.06)';
const hasInput=state.input.trim().length>0;const sendActive=hasInput&&!state.loading;
return `<div class="chat-header"><button class="close-btn" data-action="goHome">✕</button><div style="flex:1"><div style="color:#f1f5f9;font-size:13px;font-weight:600">${sc.label}</div><div style="color:#64748b;font-size:10px;margin-top:1px">${m.titleKo}</div></div><button class="feedback-btn" style="background:${fbBg};color:${fbColor};border-color:${fbBorder}" data-action="feedback" ${!canFb?'disabled':''}>${state.feedbackRequested?'✓ 완료':'📊 피드백'}</button></div><div class="chat-messages" id="chatMessages">${msgs}${typing}<div id="msgEnd"></div></div><div class="chat-input-wrap"><input class="chat-input" id="chatInput" value="${escapeAttr(state.input)}" placeholder="Type your response in English..." ${state.loading?'disabled':''}><button class="send-btn" data-action="send" style="background:${sendActive?m.color:'rgba(255,255,255,.04)'};color:${sendActive?'#fff':'#475569'};cursor:${sendActive?'pointer':'default'}">↑</button></div>`;
}

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
function escapeAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function bindEvents(){
document.querySelectorAll('[data-action="selectMode"]').forEach(el=>{el.onclick=()=>setState({selectedMode:MODES[el.dataset.idx],screen:'scenarios'})});
document.querySelectorAll('[data-action="goHome"]').forEach(el=>{el.onclick=()=>setState({screen:'home'})});
document.querySelectorAll('[data-action="startScenario"]').forEach(el=>{el.onclick=()=>startSession(state.selectedMode,state.selectedMode.scenarios[el.dataset.idx])});
document.querySelectorAll('[data-action="feedback"]').forEach(el=>{el.onclick=requestFeedback});
document.querySelectorAll('[data-action="send"]').forEach(el=>{el.onclick=sendMessage});
document.querySelectorAll('[data-action="saveKey"]').forEach(el=>{el.onclick=()=>{const k=state.apiKeyInput.trim();if(k){setApiKey(k);setState({screen:'home'})}}});
document.querySelectorAll('[data-action="settings"]').forEach(el=>{el.onclick=()=>setState({screen:'setup'})});
const input=document.getElementById('chatInput');
if(input){input.oninput=(e)=>{state.input=e.target.value};input.onkeydown=(e)=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}}
const akInput=document.getElementById('apiKeyInput');
if(akInput){akInput.oninput=(e)=>{state.apiKeyInput=e.target.value};akInput.onkeydown=(e)=>{if(e.key==='Enter'){const k=state.apiKeyInput.trim();if(k){setApiKey(k);setState({screen:'home'})}}}}
}

render();
</script>
</body>
</html>
